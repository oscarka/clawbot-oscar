<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Agent 状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            overflow: hidden;
        }

        /* 蒙层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .overlay-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .overlay-status {
            font-size: 24px;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 状态面板 */
        .status-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 500px;
            max-height: 90vh;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            z-index: 9999;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .status-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .status-item {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid;
        }

        .status-item.running { border-left-color: #4CAF50; }
        .status-item.stuck { border-left-color: #FFC107; }
        .status-item.error { border-left-color: #F44336; }
        .status-item.complete { border-left-color: #2196F3; }

        .status-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .command-log {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
        }

        .command-item {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            word-break: break-all;
        }

        .command-item.executing {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4CAF50;
        }

        .command-item.success {
            color: #4CAF50;
        }

        .command-item.error {
            color: #F44336;
        }

        /* 滚动条样式 */
        .status-panel::-webkit-scrollbar {
            width: 8px;
        }

        .status-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .status-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- 蒙层 -->
    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <div class="overlay-title">🚀 测试中</div>
            <div style="font-size: 32px; margin: 20px 0;">请勿操作</div>
            <div class="overlay-status" id="overlayStatus">初始化中...</div>
        </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-header">📊 实时状态</div>
        <div id="statusContainer"></div>
        <div class="command-log">
            <div style="font-weight: bold; margin-bottom: 10px;">📝 执行指令</div>
            <div id="commandContainer"></div>
        </div>
    </div>

    <script>
        let statusHistory = [];
        let commandHistory = [];

        function updateStatus(status, details) {
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            
            // 更新状态历史
            statusHistory.unshift({
                status,
                details,
                timestamp
            });
            
            // 只保留最近10条
            if (statusHistory.length > 10) {
                statusHistory = statusHistory.slice(0, 10);
            }

            // 更新蒙层
            const overlayStatus = document.getElementById('overlayStatus');
            const statusColors = {
                '进行中': '#4CAF50',
                '卡住了': '#FFC107',
                '中断了': '#F44336',
                '完成': '#2196F3'
            };
            
            overlayStatus.textContent = `${status}: ${details}`;
            overlayStatus.style.color = statusColors[status] || '#fff';

            // 更新状态面板
            renderStatus();
        }

        function addCommand(command, status = 'executing') {
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            commandHistory.unshift({
                command,
                status,
                timestamp
            });
            
            if (commandHistory.length > 20) {
                commandHistory = commandHistory.slice(0, 20);
            }

            renderCommands();
        }

        function renderStatus() {
            const container = document.getElementById('statusContainer');
            container.innerHTML = statusHistory.map(item => {
                const statusClass = {
                    '进行中': 'running',
                    '卡住了': 'stuck',
                    '中断了': 'error',
                    '完成': 'complete'
                }[item.status] || 'running';

                return `
                    <div class="status-item ${statusClass}">
                        <div class="status-time">${item.timestamp}</div>
                        <div class="status-text">
                            <strong>${item.status}</strong>: ${item.details}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCommands() {
            const container = document.getElementById('commandContainer');
            container.innerHTML = commandHistory.map(item => {
                return `
                    <div class="command-item ${item.status}">
                        <div style="color: rgba(255,255,255,0.6); font-size: 10px;">${item.timestamp}</div>
                        <div>${item.command}</div>
                    </div>
                `;
            }).join('');
        }

        // 从状态服务读取
        async function pollStatus() {
            try {
                const response = await fetch('/status?' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    
                    // 更新状态
                    if (data.status) {
                        // 避免重复添加相同状态
                        const lastStatus = statusHistory[0];
                        if (!lastStatus || lastStatus.status !== data.status || lastStatus.details !== data.details) {
                             updateStatus(data.status, data.details);
                        }
                    }
                    
                    // 更新命令日志
                    if (data.commands && data.commands.length > 0) {
                        // 简单处理：重新渲染
                        const container = document.getElementById('commandContainer');
                        container.innerHTML = data.commands.map(cmdLine => {
                            // cmdLine 格式: [TIMESTAMP] STATUS: Command
                            // 解析一下
                            let status = 'executing';
                            let text = cmdLine;
                            if (cmdLine.includes('SUCCESS:')) { status = 'success'; }
                            else if (cmdLine.includes('ERROR:')) { status = 'error'; }
                            else if (cmdLine.includes('WARNING:')) { status = 'stuck'; }
                            
                            return `
                                <div class="command-item ${status}">
                                    <div>${text}</div>
                                </div>
                            `;
                        }).join('');
                    }
                }
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        // 使用 Server-Sent Events 或 WebSocket（简化版：轮询）
        setInterval(pollStatus, 1000);

        // 初始化
        updateStatus('进行中', '等待测试开始...');
        addCommand('初始化监控界面', 'success');
    </script>
</body>
</html>
